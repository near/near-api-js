name: Release

on:
  push:
    branches:
      - master
      - pre-release/*

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    environment: NPM
    steps:
      - name: Checkout Repo
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262  # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
        with:
          version: 10.28.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 20.18.3
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install

      - name: Build Packages
        run: pnpm build

      - name: Create Release Pull Request or Publish to NPM
        uses: changesets/action@v1
        with:
          publish: pnpm release
          commit: "chore(release): publish packages"
          title: "Publish packages"
          createGithubReleases: ${{ github.ref_name == 'master' }}
          branch: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # setup-node by default reads from this env var
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # disables Husky so it's NOT triggered when publishing tags for a new release
          HUSKY: 0
